<!-- ================= ADD PRODUCT ================= -->
<form
  *ngIf="productAction.event.action === addProductAction"
  [formGroup]="addProductForm"
  (ngSubmit)="handleSubmitAddProduct()"
>
  <div class="card flex flex-column gap-3">

    <input pInputText placeholder="Nome" formControlName="name" />

    <p-dropdown
      styleClass="w-full"
      [options]="categoriesDatas"
      optionLabel="name"
      optionValue="id"
      placeholder="Selecione uma categoria"
      formControlName="category_id">
    </p-dropdown>

    <input pInputText placeholder="Preço" formControlName="price" />
    <input pInputText placeholder="Descrição" formControlName="description" />
    <input pInputText placeholder="Quantidade" formControlName="amount" />

    <div class="flex justify-content-center">
      <p-button
        [disabled]="addProductForm.invalid"
        type="submit"
        label="Concluir">
      </p-button>
    </div>

  </div>
</form>


<!-- ================= EDIT PRODUCT ================= -->
<form
  *ngIf="productAction.event.action === editProductAction"
  [formGroup]="editProductForm"
  (ngSubmit)="handleSubmitEditProduct()"
>
  <div class="card flex flex-column gap-3">

    <input pInputText placeholder="Nome" formControlName="name" />

    <p-dropdown
      styleClass="w-full"
      [options]="categoriesDatas"
      optionLabel="name"
      optionValue="id"
      formControlName="category_id">
    </p-dropdown>

    <input pInputText placeholder="Preço" formControlName="price" />
    <input pInputText placeholder="Descrição" formControlName="description" />
    <input pInputText type="number" placeholder="Quantidade" formControlName="amount" />

    <div class="flex justify-content-center">
      <p-button
        [disabled]="editProductForm.invalid"
        type="submit"
        label="Concluir">
      </p-button>
    </div>

  </div>
</form>


<!-- ================= SALE PRODUCT ================= -->
<form
  *ngIf="productAction.event.action === saleProductAction"
  [formGroup]="saleProductForm"
  (ngSubmit)="handleSubmitSaleProduct()"
>
  <div class="card flex flex-column gap-3">

    <p-dropdown
      [options]="productAction.productDatas"
      styleClass="w-full"
      optionLabel="name"
      optionValue="id"
      placeholder="Selecione um produto"
      formControlName="product_id">
    </p-dropdown>

    <input
      type="number"
      pInputText
      placeholder="Quantidade"
      formControlName="amount"
    />

    <div class="flex justify-content-center">
      <p-button
        [disabled]="saleProductForm.invalid"
        type="submit"
        label="Concluir">
      </p-button>
    </div>

  </div>
</form>
